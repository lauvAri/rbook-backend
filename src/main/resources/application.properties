spring.application.name=r-book

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/r_book?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Code Runner Configuration
app.coderunner.r-executable=Rscript
app.coderunner.script-storage-path=./scripts
app.coderunner.timeout-seconds=30
app.coderunner.max-file-size=5MB

# Server Configuration
server.port=8080

